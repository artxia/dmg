name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  SCHEME: MoleUI
  PRODUCT_NAME: "Mole UI"
  APP_BUNDLE_ID: com.qinfuyao.MoleUI

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.21

      - name: Install dependencies
        run: brew install create-dmg mole

      - name: Build Mole binaries
        run: |
          cd Resources/mole
          make release-amd64
          
          # Rename binaries to match expected names in bin/analyze.sh and bin/status.sh
          mv bin/analyze-darwin-amd64 bin/analyze-go
          mv bin/status-darwin-amd64 bin/status-go
          
          # Verify binaries are in place
          echo "=== Verifying compiled binaries ==="
          ls -lah bin/analyze-go bin/status-go
          file bin/analyze-go bin/status-go

      - name: Archive app
        run: |
          xcodebuild -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MoleUI.xcarchive \
            -arch x86_64 \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            archive

      - name: Export app from archive
        run: |
          mkdir -p $RUNNER_TEMP/export
          cp -R "$RUNNER_TEMP/MoleUI.xcarchive/Products/Applications/$PRODUCT_NAME.app" \
            "$RUNNER_TEMP/export/$PRODUCT_NAME.app"

      - name: Bundle Mole CLI into app
        run: |
          APP="$RUNNER_TEMP/export/$PRODUCT_NAME.app"
          MOLE_DIR="$APP/Contents/Resources/mole"
          mkdir -p "$MOLE_DIR"

          # Copy entire mole directory from project Resources
          # This includes: bin/, lib/, mole script, and all dependencies
          cp -R Resources/mole/* "$MOLE_DIR/"

          echo "Mole CLI bundled into app"
          
          # Verify critical files are present
          echo "=== Verifying bundled mole structure ==="
          echo "Root files:"
          ls -la "$MOLE_DIR/" | grep -E "^-" | head -5
          
          echo "Bin directory:"
          ls -la "$MOLE_DIR/bin/"
          
          echo "Lib directory:"
          ls -la "$MOLE_DIR/lib/" | head -5
          
          # Verify the binaries are executable
          if [[ -x "$MOLE_DIR/bin/analyze-go" ]]; then
            echo "✓ analyze-go is executable"
          else
            echo "✗ ERROR: analyze-go is not executable"
            exit 1
          fi
          
          if [[ -x "$MOLE_DIR/bin/status-go" ]]; then
            echo "✓ status-go is executable"
          else
            echo "✗ ERROR: status-go is not executable"
            exit 1
          fi
          
          if [[ -x "$MOLE_DIR/mole" ]]; then
            echo "✓ mole script is executable"
          else
            echo "✗ ERROR: mole script is not executable"
            exit 1
          fi

      - name: Create DMG
        run: |
          create-dmg \
            --volname "$PRODUCT_NAME" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$PRODUCT_NAME.app" 150 185 \
            --app-drop-link 450 185 \
            "$RUNNER_TEMP/MoleUI.dmg" \
            "$RUNNER_TEMP/export/"

      - name: Rename DMG with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp "$RUNNER_TEMP/MoleUI.dmg" "$RUNNER_TEMP/MoleUI-${VERSION}.dmg"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/MoleUI-*.dmg
          generate_release_notes: true
