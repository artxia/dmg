name: Build and Release
on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      title:
        description: 'Optional build title (fallback to branch name)'
        required: false
        default: ''

jobs:
  build-helper:
    name: Build ai-reminder sidecar (create tarball on x86 mac)
    # Use macos-14-large to get an x86_64 GitHub-hosted mac runner per runner-images guidance
    runs-on: macos-14-large
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Install Node deps
        run: |
          set -e
          npm ci

      - name: Build mac sidecar (x64)
        run: |
          set -euo pipefail
          echo "Building sidecar for darwin:x64"
          npm run build:sidecar:mac:x64

          echo "Listing generated paths:"
          ls -la src-tauri || true
          ls -la src-tauri/resources || true
          ls -la src-tauri/resources/ai-reminder || true
          ls -la src-tauri/resources/node || true
          ls -la src-tauri/binaries || true

      - name: Ensure x86_64 Node runtime exists (download if missing)
        run: |
          set -euo pipefail
          NODE_BIN="src-tauri/resources/node/bin/node"
          if [ -f "$NODE_BIN" ]; then
            echo "Node runtime exists at $NODE_BIN"
            file "$NODE_BIN" || true
            if command -v lipo >/dev/null 2>&1; then lipo -info "$NODE_BIN" || true; fi
          else
            echo "Node runtime missing — downloading darwin x64 Node to embed into sidecar"
            NODE_VER="v18.20.1"
            NODE_PKG="node-${NODE_VER}-darwin-x64"
            TAR="${NODE_PKG}.tar.gz"
            URL="https://nodejs.org/dist/${NODE_VER}/${TAR}"
            curl -fL -o "${TAR}" "${URL}"
            tar -xzf "${TAR}"
            mkdir -p "$(dirname "$NODE_BIN")"
            cp "${NODE_PKG}/bin/node" "$NODE_BIN"
            chmod +x "$NODE_BIN"
            file "$NODE_BIN" || true
            if command -v lipo >/dev/null 2>&1; then lipo -info "$NODE_BIN" || true; fi
            rm -rf "${NODE_PKG}" "${TAR}"
          fi

      - name: Verify ai-reminder wrapper(s) present
        run: |
          set -euo pipefail
          ls -la src-tauri/binaries || true
          if ! ls src-tauri/binaries/ai-reminder* 1> /dev/null 2>&1; then
            echo "ERROR: expected ai-reminder wrapper(s) under src-tauri/binaries but none found"
            exit 1
          fi
          for f in src-tauri/binaries/ai-reminder*; do
            echo "Wrapper: $f"
            file "$f" || true
          done

      - name: Package sidecar into tarball
        run: |
          set -euo pipefail
          PKG="ai-reminder-sidecar.tar.gz"
          rm -rf .sidecar_package
          mkdir -p .sidecar_package/src-tauri/resources
          mkdir -p .sidecar_package/src-tauri/binaries
          if [ -d src-tauri/resources/ai-reminder ]; then
            cp -a src-tauri/resources/ai-reminder .sidecar_package/src-tauri/resources/
          fi
          if [ -d src-tauri/resources/node ]; then
            cp -a src-tauri/resources/node .sidecar_package/src-tauri/resources/
          fi
          if ls src-tauri/binaries/ai-reminder* 1> /dev/null 2>&1; then
            cp -a src-tauri/binaries/ai-reminder* .sidecar_package/src-tauri/binaries/ || true
          fi
          echo "Sidecar package preview:"
          find .sidecar_package -type f -print || true
          tar -czf "$PKG" -C .sidecar_package .
          ls -la "$PKG"

      - name: Upload sidecar tarball
        uses: actions/upload-artifact@v4
        with:
          name: ai-reminder-sidecar
          path: ai-reminder-sidecar.tar.gz
          retention-days: 1

  build:
    name: macos-latest
    needs: build-helper
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - build: macos
            os: macos-latest
            rust: stable
            target: x86_64-apple-darwin
    env:
      BUILD_TITLE: ${{ github.event.inputs.title || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Download sidecar tarball
        uses: actions/download-artifact@v4
        with:
          name: ai-reminder-sidecar
          path: ./helper-artifact

      - name: Inspect downloaded artifact
        run: |
          set -euo pipefail
          echo "helper-artifact listing:"
          ls -la helper-artifact || true
          if [ -f helper-artifact/ai-reminder-sidecar.tar.gz ]; then
            tar -tzf helper-artifact/ai-reminder-sidecar.tar.gz | sed -n '1,200p' || true
          else
            echo "ERROR: ai-reminder-sidecar.tar.gz missing from helper-artifact"
            ls -la helper-artifact || true
            exit 1
          fi

      - name: Extract sidecar into repo
        run: |
          set -euo pipefail
          mkdir -p tmp_sidecar_unpack
          tar -xzf helper-artifact/ai-reminder-sidecar.tar.gz -C tmp_sidecar_unpack
          find tmp_sidecar_unpack -maxdepth 4 -type f -print || true
          mkdir -p src-tauri/resources src-tauri/binaries
          if [ -d tmp_sidecar_unpack/src-tauri/resources ]; then
            cp -a tmp_sidecar_unpack/src-tauri/resources/* src-tauri/resources/ || true
          fi
          if [ -d tmp_sidecar_unpack/src-tauri/binaries ]; then
            cp -a tmp_sidecar_unpack/src-tauri/binaries/* src-tauri/binaries/ || true
          fi
          if [ -f tmp_sidecar_unpack/ai-reminder-x86_64-apple-darwin ]; then
            cp tmp_sidecar_unpack/ai-reminder-x86_64-apple-darwin src-tauri/binaries/ || true
          fi
          if [ -f src-tauri/binaries/ai-reminder-x86_64-apple-darwin ] && [ ! -f src-tauri/binaries/ai-reminder ]; then
            cp src-tauri/binaries/ai-reminder-x86_64-apple-darwin src-tauri/binaries/ai-reminder || true
          fi
          chmod -R a+rX src-tauri/resources src-tauri/binaries || true
          ls -la src-tauri/resources || true
          ls -la src-tauri/resources/ai-reminder || true
          ls -la src-tauri/resources/node/bin || true
          ls -la src-tauri/binaries || true
          if [ ! -d src-tauri/resources/ai-reminder ]; then
            echo "ERROR: resources/ai-reminder not present after extraction"
            exit 1
          fi
          if ! ls src-tauri/binaries/ai-reminder* 1> /dev/null 2>&1; then
            echo "ERROR: binaries/ai-reminder* not present after extraction"
            exit 1
          fi

      - name: Install Rust (for main build)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          target: ${{ matrix.target }}

      - name: Rust cache restore
        id: cache_store
        uses: actions/cache/restore@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend deps
        run: npm ci

      - name: Build for macOS (x86_64)
        run: |
          set -e
          rustup target add x86_64-apple-darwin || true
          npm run tauri build -- --target x86_64-apple-darwin
          mkdir -p output/macos
          mv src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg output/macos/"${BUILD_TITLE}"-x86_64.dmg || true
          mv src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg output/macos/"${BUILD_TITLE}"-x86_64.dmg || true

      - name: Rust cache store
        uses: actions/cache/save@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Upload artifact (branch build)
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          name: macos-dmg-${{ env.BUILD_TITLE }}-x86_64
          path: 'output/macos/*.dmg'

      - name: Upload For Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/') == true
        with:
          allowUpdates: true
          artifacts: 'output/*/*.*'
          token: ${{ secrets.GITHUB_TOKEN }}
