name: Build and Release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:

jobs:
  build:
    name: macos-latest
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: macos
            os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p output/macos
          
          xcodebuild -scheme "MoleUI" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MoleUI.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            archive
          
          mkdir -p $RUNNER_TEMP/export
          cp -R "$RUNNER_TEMP/MoleUI.xcarchive/Products/Applications/Mole UI.app" \
            "$RUNNER_TEMP/export/Mole UI.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Mole UI" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Mole UI.app" 150 185 \
            --app-drop-link 450 185 \
            output/macos/MoleUI.dmg \
            "$RUNNER_TEMP/export/"

      - name: Upload For Single Build
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          path: 'output/*/*.*'

      - name: Upload For Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/') == true
        with:
          allowUpdates: true
          artifacts: 'output/*/*.*'
          token: ${{ secrets.GITHUB_TOKEN }}
