name: Build and Release
on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      title:
        description: 'Optional build title (fallback to branch name)'
        required: false
        default: ''

jobs:
  build:
    name: macos-latest
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: macos
            os: macos-latest
            rust: stable
            target: x86_64-apple-darwin
    env:
      BUILD_TITLE: ${{ github.event.inputs.title || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          target: ${{ matrix.target }}

      - name: Rust cache restore
        id: cache_store
        uses: actions/cache/restore@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Checkout upstream helper source
        # fetch upstream repo into `upstream/` so we can build its helper crate
        uses: actions/checkout@v3
        with:
          repository: ZekerTop/ai-cli-complete-notify
          path: upstream
          fetch-depth: 1

      - name: Prepare native helper binary (build upstream ai-reminder for x86_64)
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          TARGET="${{ matrix.target }}"

          # If upstream contains a tools/ai-reminder crate, build it
          if [ -d "upstream/tools/ai-reminder" ]; then
            echo "Building upstream/tools/ai-reminder for ${TARGET}"
            rustup target add "${TARGET}" || true
            pushd upstream/tools/ai-reminder
            cargo build --release --target "${TARGET}"
            BINARY_PATH="target/${TARGET}/release/ai-reminder"
            if [ ! -f "${BINARY_PATH}" ]; then
              echo "ERROR: built binary not found at ${BINARY_PATH}"
              ls -la target/${TARGET}/release || true
              exit 1
            fi
            # copy to the path expected by your tauri build
            cp "${BINARY_PATH}" "../../../src-tauri/binaries/ai-reminder-${TARGET}"
            popd
            chmod +x "src-tauri/binaries/ai-reminder-${TARGET}"
            echo "Built helper copied to src-tauri/binaries/ai-reminder-${TARGET}"
          else
            # Fallback: try to download prebuilt asset from upstream release v2.8.0
            echo "upstream/tools/ai-reminder not found — attempting to download prebuilt asset from ZekerTop release"
            UPSTREAM_OWNER="ZekerTop"
            UPSTREAM_REPO="ai-cli-complete-notify"
            RELEASE_TAG="v2.8.0"
            ASSET_NAME="ai-reminder-${TARGET}"
            DOWNLOAD_URL="https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/releases/download/${RELEASE_TAG}/${ASSET_NAME}"

            echo "Downloading ${DOWNLOAD_URL}"
            if curl -fL -o "src-tauri/binaries/${ASSET_NAME}" "${DOWNLOAD_URL}"; then
              chmod +x "src-tauri/binaries/${ASSET_NAME}"
              echo "Downloaded upstream helper to src-tauri/binaries/${ASSET_NAME}"
            else
              echo "ERROR: upstream asset ${ASSET_NAME} not found at ${DOWNLOAD_URL}"
              echo "Listing assets available in upstream release ${RELEASE_TAG}:"
              curl -s "https://api.github.com/repos/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/releases/tags/${RELEASE_TAG}" \
                | grep -E '"name":' || true
              exit 1
            fi
          fi

      - name: Build for macOS (x86_64)
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          rustup target add x86_64-apple-darwin || true
          npm run tauri build -- --target x86_64-apple-darwin
          mkdir -p output/macos
          # Move artifacts to output directory, keep compatibility with universal builds
          mv src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg output/macos/"${BUILD_TITLE}"-x86_64.dmg || true
          mv src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg output/macos/"${BUILD_TITLE}"-x86_64.dmg || true

      - name: Rust cache store
        uses: actions/cache/save@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Upload artifact (branch build)
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          name: macos-dmg-${{ env.BUILD_TITLE }}-x86_64
          path: 'output/macos/*.dmg'

      - name: Upload For Release
        # arg info: https://github.com/ncipollo/release-action#release-action
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/') == true
        with:
          allowUpdates: true
          artifacts: 'output/*/*.*'
          token: ${{ secrets.GITHUB_TOKEN }}
