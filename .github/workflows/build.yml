name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  SCHEME: MoleUI
  PRODUCT_NAME: "Mole UI"
  APP_BUNDLE_ID: com.qinfuyao.MoleUI

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.21

      - name: Install dependencies
        run: brew install create-dmg mole

      - name: Build Mole binaries
        run: |
          cd Resources/mole
          make release-amd64
          
          # Rename binaries to match expected names
          mv bin/analyze-darwin-amd64 bin/analyze-go
          mv bin/status-darwin-amd64 bin/status-go
          
          # Verify binaries exist and are executable
          echo "=== Verifying Go binaries ==="
          file bin/analyze-go bin/status-go
          [[ -x bin/analyze-go ]] || exit 1
          [[ -x bin/status-go ]] || exit 1
          echo "✓ Both Go binaries compiled successfully"

      - name: Archive app
        run: |
          xcodebuild -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MoleUI.xcarchive \
            -arch x86_64 \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            archive

      - name: Export app from archive
        run: |
          mkdir -p $RUNNER_TEMP/export
          cp -R "$RUNNER_TEMP/MoleUI.xcarchive/Products/Applications/$PRODUCT_NAME.app" \
            "$RUNNER_TEMP/export/$PRODUCT_NAME.app"

      - name: Bundle Mole CLI into app
        run: |
          APP="$RUNNER_TEMP/export/$PRODUCT_NAME.app"
          MOLE_DIR="$APP/Contents/Resources/mole"
          mkdir -p "$MOLE_DIR"

          # Copy entire mole directory structure
          cp -R Resources/mole/* "$MOLE_DIR/"

          echo "=== Verifying bundled Mole structure ==="
          
          # Verify critical shell scripts
          echo "Checking main scripts..."
          for script in mole mo; do
            if [[ -x "$MOLE_DIR/$script" ]]; then
              echo "✓ $script is present and executable"
            else
              echo "✗ FAILED: $script missing or not executable"
              exit 1
            fi
          done
          
          # Verify Go binaries exist in bin/
          echo "Checking Go binaries..."
          for binary in analyze-go status-go; do
            if [[ -x "$MOLE_DIR/bin/$binary" ]]; then
              echo "✓ $binary is present and executable"
            else
              echo "✗ FAILED: $binary missing or not executable"
              exit 1
            fi
          done
          
          # Verify lib/core exists with required modules
          echo "Checking lib/core modules..."
          for module in base log timeout file_ops help ui app_protection commands; do
            if [[ -f "$MOLE_DIR/lib/core/${module}.sh" ]]; then
              echo "✓ lib/core/${module}.sh exists"
            else
              echo "✗ WARNING: lib/core/${module}.sh missing"
            fi
          done
          
          # Verify bin scripts
          echo "Checking bin scripts..."
          for script in analyze.sh status.sh clean.sh optimize.sh uninstall.sh; do
            if [[ -x "$MOLE_DIR/bin/$script" ]]; then
              echo "✓ bin/$script exists and executable"
            else
              echo "✗ WARNING: bin/$script missing or not executable"
            fi
          done
          
          # Verify lib subdirectories
          echo "Checking lib subdirectories..."
          for subdir in clean optimize uninstall check manage ui; do
            if [[ -d "$MOLE_DIR/lib/$subdir" ]]; then
              echo "✓ lib/$subdir/ exists"
            else
              echo "✗ WARNING: lib/$subdir/ missing"
            fi
          done
          
          echo "✓ Mole CLI bundled successfully"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "$PRODUCT_NAME" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$PRODUCT_NAME.app" 150 185 \
            --app-drop-link 450 185 \
            "$RUNNER_TEMP/MoleUI.dmg" \
            "$RUNNER_TEMP/export/"

      - name: Rename DMG with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp "$RUNNER_TEMP/MoleUI.dmg" "$RUNNER_TEMP/MoleUI-${VERSION}.dmg"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/MoleUI-*.dmg
          generate_release_notes: true
