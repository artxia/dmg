name: Build and Release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:

jobs:
  build:
    name: macos-latest
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: macos
            os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p output/macos
          
          xcodebuild -scheme "MoleUI" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MoleUI.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            archive
          
          mkdir -p $RUNNER_TEMP/export
          cp -R "$RUNNER_TEMP/MoleUI.xcarchive/Products/Applications/Mole UI.app" \
            "$RUNNER_TEMP/export/Mole UI.app"

      - name: Sign and notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          SIGN_ID="Developer ID Application: Fuyao Qin (646VSJ9K5F)"
          APP="$RUNNER_TEMP/export/Mole UI.app"
          
          codesign --force --timestamp --options runtime \
            --entitlements MoleUI/MoleUI.entitlements \
            --sign "$SIGN_ID" "$APP"
          
          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$TEAM_ID"
          
          /usr/bin/ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/MoleUI.zip"
          xcrun notarytool submit "$RUNNER_TEMP/MoleUI.zip" \
            --keychain-profile "notary-profile" \
            --wait
          
          xcrc stapler staple "$APP"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Mole UI" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Mole UI.app" 150 185 \
            --app-drop-link 450 185 \
            output/macos/MoleUI.dmg \
            "$RUNNER_TEMP/export/"

      - name: Upload For Single Build
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          path: 'output/*/*.*'

      - name: Upload For Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/') == true
        with:
          allowUpdates: true
          artifacts: 'output/*/*.*'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
