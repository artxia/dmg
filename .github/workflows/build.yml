name: Build and Release
on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      title:
        description: 'Optional build title (fallback to branch name)'
        required: false
        default: ''

jobs:
  build-helper:
    name: Build ai-reminder sidecar (x86_64 mac)
    # IMPORTANT: This job MUST run on an x86_64 mac runner to produce an x86 node binary.
    # If your account provides macos-11 as x86_64, use macos-11. Here we use macos-12 as common choice.
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Install Node (for sidecar build) and Rust (if needed)
        run: |
          # Node and npm exist on mac runners; ensure npm packages will be installed.
          node -v || true
          npm -v || true
          rustc -V || true

      - name: Install npm deps
        run: |
          set -e
          npm ci

      - name: Build mac sidecar (x64)
        run: |
          set -euo pipefail
          echo "Building sidecar for darwin:x64 via npm script"
          npm run build:sidecar:mac:x64
          echo "Sidecar build finished. Listing generated paths:"
          ls -la src-tauri/resources || true
          ls -la src-tauri/resources/ai-reminder || true
          ls -la src-tauri/resources/node || true
          ls -la src-tauri/binaries || true

      - name: Verify node binary arch and wrapper
        run: |
          set -euo pipefail
          echo "Runner arch:"
          uname -m
          if [ -f src-tauri/resources/node/bin/node ]; then
            echo "Node binary present at src-tauri/resources/node/bin/node"
            file src-tauri/resources/node/bin/node || true
            # macOS universal check (lipo) if available
            if command -v lipo >/dev/null 2>&1; then
              lipo -info src-tauri/resources/node/bin/node || true
            fi
          else
            echo "WARNING: node binary not found at src-tauri/resources/node/bin/node"
            ls -la src-tauri/resources || true
            exit 1
          fi
          if [ -f src-tauri/binaries/ai-reminder-x86_64-apple-darwin ]; then
            echo "Wrapper present: src-tauri/binaries/ai-reminder-x86_64-apple-darwin"
            ls -la src-tauri/binaries/ai-reminder* || true
          else
            echo "ERROR: expected wrapper not found in src-tauri/binaries"
            ls -la src-tauri/binaries || true
            exit 1
          fi

      - name: Upload sidecar resources artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-reminder-sidecar
          path: |
            src-tauri/resources/ai-reminder
            src-tauri/resources/node
            src-tauri/binaries/ai-reminder-*
          retention-days: 1

  build:
    name: macos-latest
    needs: build-helper
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - build: macos
            os: macos-latest
            rust: stable
            target: x86_64-apple-darwin
    env:
      BUILD_TITLE: ${{ github.event.inputs.title || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-reminder-sidecar
          path: ./helper-artifact

      - name: Inspect downloaded artifact
        run: |
          set -euo pipefail
          echo "helper-artifact contents:"
          ls -la helper-artifact || true
          # show nested dirs if present
          find helper-artifact -maxdepth 3 -type f -print || true

      - name: Place helper into Tauri resources & binaries
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/ai-reminder
          mkdir -p src-tauri/resources/node/bin
          mkdir -p src-tauri/binaries

          # Copy downloaded parts (artifact contains paths relative to repo)
          # The upload used explicit paths; adapt copying by checking what's present.
          if [ -d helper-artifact/ai-reminder ]; then
            cp -a helper-artifact/ai-reminder src-tauri/resources/ai-reminder
          fi
          if [ -d helper-artifact/node ]; then
            cp -a helper-artifact/node src-tauri/resources/node
          fi
          # Copy any matching ai-reminder wrapper(s)
          shopt -s nullglob || true
          for f in helper-artifact/ai-reminder* helper-artifact/src-tauri/binaries/ai-reminder* helper-artifact/ai-reminder-*; do
            if [ -f "$f" ]; then
              cp "$f" src-tauri/binaries/ || true
            fi
          done
          # Also copy any binaries found under helper-artifact
          cp -a helper-artifact/src-tauri/binaries/* src-tauri/binaries/ 2>/dev/null || true

          # If no wrapper existed under helper-artifact root, try common locations
          if [ -f helper-artifact/ai-reminder-x86_64-apple-darwin ]; then
            cp helper-artifact/ai-reminder-x86_64-apple-darwin src-tauri/binaries/ || true
          fi

          # Ensure expected names present for tauri.conf.json (externalBin: "binaries/ai-reminder")
          if [ -f src-tauri/binaries/ai-reminder-x86_64-apple-darwin ] && [ ! -f src-tauri/binaries/ai-reminder ]; then
            cp src-tauri/binaries/ai-reminder-x86_64-apple-darwin src-tauri/binaries/ai-reminder || true
          fi

          chmod -R a+rX src-tauri/resources src-tauri/binaries || true
          echo "After copy, listing src-tauri/resources and src-tauri/binaries:"
          ls -la src-tauri/resources || true
          ls -la src-tauri/resources/ai-reminder || true
          ls -la src-tauri/resources/node/bin || true
          ls -la src-tauri/binaries || true

      - name: Install Rust (for main build)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          target: ${{ matrix.target }}

      - name: Rust cache restore
        id: cache_store
        uses: actions/cache/restore@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend deps
        run: npm ci

      - name: Build for macOS (x86_64)
        run: |
          set -e
          rustup target add x86_64-apple-darwin || true
          npm run tauri build -- --target x86_64-apple-darwin
          mkdir -p output/macos
          mv src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg output/macos/"${BUILD_TITLE}"-x86_64.dmg || true
          mv src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg output/macos/"${BUILD_TITLE}"-x86_64.dmg || true

      - name: Rust cache store
        uses: actions/cache/save@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Upload artifact (branch build)
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          name: macos-dmg-${{ env.BUILD_TITLE }}-x86_64
          path: 'output/macos/*.dmg'

      - name: Upload For Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/') == true
        with:
          allowUpdates: true
          artifacts: 'output/*/*.*'
          token: ${{ secrets.GITHUB_TOKEN }}
