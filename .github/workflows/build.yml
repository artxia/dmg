name: Build and Release
on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      title:
        description: 'Optional build title (fallback to branch name)'
        required: false
        default: ''

jobs:
  build:
    name: macos-latest
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: macos
            os: macos-latest
            rust: stable
            target: x86_64-apple-darwin
    env:
      BUILD_TITLE: ${{ github.event.inputs.title || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          target: ${{ matrix.target }}

      - name: Rust cache restore
        id: cache_store
        uses: actions/cache/restore@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Prepare native helper binary (build locally in repo)
        run: |
          set -euo pipefail

          mkdir -p src-tauri/binaries
          TARGET="${{ matrix.target }}"
          echo "Preparing helper binary for target: ${TARGET}"

          # 1) If this repo contains a helper crate at src-tauri/ai-reminder, build that.
          if [ -d "src-tauri/ai-reminder" ]; then
            echo "Found local helper at src-tauri/ai-reminder — building it"
            pushd src-tauri/ai-reminder
            rustup target add "${TARGET}" || true
            cargo build --release --target "${TARGET}"
            if [ ! -f "target/${TARGET}/release/ai-reminder" ]; then
              echo "ERROR: expected built binary not found: target/${TARGET}/release/ai-reminder"
              ls -la "target/${TARGET}/release" || true
              exit 1
            fi
            cp "target/${TARGET}/release/ai-reminder" "../../binaries/ai-reminder-${TARGET}"
            popd
            chmod +x "src-tauri/binaries/ai-reminder-${TARGET}"
            echo "Built helper copied to src-tauri/binaries/ai-reminder-${TARGET}"
            exit 0
          fi

          # 2) If there is a tools/ai-reminder crate in this repo, build that.
          if [ -d "tools/ai-reminder" ]; then
            echo "Found local helper at tools/ai-reminder — building it"
            pushd tools/ai-reminder
            rustup target add "${TARGET}" || true
            cargo build --release --target "${TARGET}"
            if [ ! -f "target/${TARGET}/release/ai-reminder" ]; then
              echo "ERROR: expected built binary not found: target/${TARGET}/release/ai-reminder"
              ls -la "target/${TARGET}/release" || true
              exit 1
            fi
            cp "target/${TARGET}/release/ai-reminder" "../../src-tauri/binaries/ai-reminder-${TARGET}"
            popd
            chmod +x "src-tauri/binaries/ai-reminder-${TARGET}"
            echo "Built helper copied to src-tauri/binaries/ai-reminder-${TARGET}"
            exit 0
          fi

          # 3) Fallback: create a minimal Rust binary in .ci/ai-reminder and build it.
          # This ensures the tauri build won't fail due to missing file. Replace with real helper if needed.
          echo "No local helper crate found; creating a minimal placeholder helper and building it"
          mkdir -p .ci/ai-reminder
          pushd .ci/ai-reminder
          # initialize a tiny cargo binary project (quiet)
          if [ ! -f Cargo.toml ]; then
            cargo init --bin --name ai-reminder --quiet
          fi
          # overwrite src/main.rs with a minimal program
          cat > src/main.rs <<'EOF'
          fn main() {
              // Minimal placeholder helper. Replace with actual helper implementation if needed.
              println!("ai-reminder placeholder");
          }
          EOF
          rustup target add "${TARGET}" || true
          cargo build --release --target "${TARGET}"
          BINARY="target/${TARGET}/release/ai-reminder"
          if [ ! -f "${BINARY}" ]; then
            echo "ERROR: placeholder build failed — binary not found at ${BINARY}"
            ls -la target/${TARGET}/release || true
            popd
            exit 1
          fi
          cp "${BINARY}" ../../src-tauri/binaries/ai-reminder-${TARGET}
          popd
          chmod +x "src-tauri/binaries/ai-reminder-${TARGET}"
          echo "Placeholder helper built and copied to src-tauri/binaries/ai-reminder-${TARGET}"

      - name: Build for macOS (x86_64)
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          rustup target add x86_64-apple-darwin || true
          npm run tauri build -- --target x86_64-apple-darwin
          mkdir -p output/macos
          # 尝试把 x86_64 输出移动到统一位置并用分支名/输入名命名
          mv src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg output/macos/"${BUILD_TITLE}"-x86_64.dmg || true
          # 兼容之前可能生成 universal bundle 的情况（作为后备）
          mv src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg output/macos/"${BUILD_TITLE}"-x86_64.dmg || true

      - name: Rust cache store
        uses: actions/cache/save@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Upload artifact (branch build)
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          name: macos-dmg-${{ env.BUILD_TITLE }}-x86_64
          path: 'output/macos/*.dmg'

      - name: Upload For Release
        # arg info: https://github.com/ncipollo/release-action#release-action
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/') == true
        with:
          allowUpdates: true
          artifacts: 'output/*/*.*'
          token: ${{ secrets.GITHUB_TOKEN }}
